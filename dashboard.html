<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediArk Reviewer Desk</title>
  <link rel="stylesheet" href="styles/mediark-app.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div>
        <div class="brand-mark">M</div>
        <h2 class="brand-title" style="font-size: 1.8rem; margin: 14px 0 6px;">MediArk</h2>
        <p class="meta-text" style="color: rgba(244,239,231,.68);">Reviewer Desk</p>
      </div>
      <nav>
        <a class="nav-link active" href="dashboard.html"><i class="fa-solid fa-user-doctor"></i><span>Reviewer Desk</span></a>
        <a class="nav-link" href="prescription.html"><i class="fa-solid fa-file-waveform"></i><span>Generate</span></a>
        <a class="nav-link" href="Admin.html"><i class="fa-solid fa-shield-heart"></i><span>Admin Console</span></a>
        <a class="nav-link" href="library.html"><i class="fa-solid fa-photo-film"></i><span>Published Library</span></a>
      </nav>
    </aside>

    <div class="shell-main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Clinical Review</p>
          <h1 class="page-title" style="font-size: 2.4rem;">医学科普审核工作台</h1>
        </div>
        <div class="topbar-actions">
          <span id="dashboard-message" style="display:none;"></span>
          <a class="button-soft" href="prescription.html">新建生成任务</a>
          <span class="chip">Reviewer <strong id="reviewer-name" style="margin-left: 6px;">Doctor</strong></span>
          <button id="logout-button" class="button-ghost">退出</button>
        </div>
      </header>

      <div class="page-wrap section-stack">
        <section class="hero-card">
          <p class="eyebrow">Doctor Reviewer Only</p>
          <h2 class="page-title" style="font-size: 2.6rem;">你的职责不是管理平台，而是给出可信的临床审核结论。</h2>
          <p class="body-muted" style="max-width: 920px;">
            这里聚焦审核队列、海报预览、多模态资产和时间线，不把作品流转管理与医学批准混在一起。
          </p>
        </section>

        <section id="metrics-strip" class="metric-grid"></section>

        <section class="dashboard-grid">
          <section class="panel-card">
            <div class="inline-actions" style="justify-content: space-between; align-items: flex-start;">
              <div>
                <h3 class="section-title">Review Queue</h3>
                <p class="body-muted">点击队列项切换右侧详情。</p>
              </div>
            </div>
            <div id="queue-list" class="queue-list" style="margin-top: 18px;"></div>
          </section>

          <section id="work-detail"></section>
        </section>
      </div>
    </div>
  </div>

  <script type="module" src="js/app/reviewer-dashboard.js"></script>
</body>
</html>
