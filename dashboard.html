<!--
-------------------------------------------------------------------------
[模块名称]: 医生智能效能看板 (Doctor Smart Dashboard)
[文件名称]: dashboard.html
[开发语言]: HTML5 / Tailwind CSS / JS
[所属子系统]: 医生智能工作台
[功能描述]: 
    1. 可视化展示医生运营数据（处方数、沟通时间、依从性）。
    2. 渲染待办审核任务列表与科普阅读趋势图表。
    3. 作为工作台的主导航枢纽，连接各个子模块。
-------------------------------------------------------------------------
-->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - 智瘤方舟工作台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex overflow-hidden">

    <!-- 左侧边栏 (保持一致) -->
    <aside class="w-64 bg-slate-900 text-white flex-shrink-0 hidden md:flex flex-col">
        <div class="p-6 flex items-center gap-3 border-b border-slate-800">
            <!-- 请确保 Logo 路径正确 -->
            <img src="网页展示素材库/logo/logo.png" class="h-8 w-auto bg-white rounded-full p-1" alt="Logo">
            <span class="font-bold text-lg tracking-wide">MediArk</span>
        </div>

        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 bg-blue-600 text-white rounded-lg shadow-lg shadow-blue-900/50 transition">
                <i class="fa-solid fa-chart-pie w-5"></i><span>工作台</span>
            </a>
            <a href="prescription.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition">
                <i class="fa-solid fa-wand-magic-sparkles w-5"></i><span>生成科普作品</span>
            </a>
            <a href="my-works.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition">
                <i class="fa-solid fa-folder-open w-5"></i><span>我的作品</span>
            </a>
            <a href="patients.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition">
                <i class="fa-solid fa-user-group w-5"></i><span>患者管理</span>
            </a>
            <a href="knowledge.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition">
                <i class="fa-solid fa-book-medical w-5"></i><span>知识库</span>
            </a>
        </nav>

        <div class="p-4 border-t border-slate-800">
            <div class="flex items-center gap-3">
                <div id="sidebar-user-avatar" class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center font-bold text-sm">?</div>
                <div class="flex-1 min-w-0">
                    <p id="sidebar-user-name" class="text-sm font-medium truncate">加载中...</p>
                    <p id="sidebar-user-role" class="text-xs text-slate-400">临床医生</p>
                </div>
            </div>
            <button onclick="sidebarLogout()" class="mt-3 w-full flex items-center justify-center gap-2 px-3 py-2 text-xs text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition">
                <i class="fa-solid fa-right-from-bracket"></i> 退出登录
            </button>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="flex-1 flex flex-col h-screen relative">
        
        <!-- 顶部导航 -->
        <header class="bg-white h-16 border-b border-slate-200 flex items-center justify-between px-8 shadow-sm z-20">
            <h1 class="text-xl font-semibold text-slate-800">工作台</h1>
            <a href="prescription.html" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> 新建作品
            </a>
        </header>

        <!-- 核心内容（动态加载） -->
        <div class="flex-1 overflow-y-auto p-8">

            <!-- 欢迎语 -->
            <div class="mb-8">
                <h2 class="text-2xl font-bold text-slate-800 mb-1" id="greeting-text">欢迎回来！</h2>
                <p class="text-slate-500 text-sm" id="greeting-sub">正在加载数据...</p>
            </div>

            <!-- 统计卡片 -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-xs font-medium text-slate-500 uppercase">管理患者</p>
                            <h3 class="text-3xl font-bold text-slate-800 mt-2" id="stat-patients">-</h3>
                        </div>
                        <div class="p-2 bg-blue-50 text-blue-600 rounded-lg"><i class="fa-solid fa-user-group"></i></div>
                    </div>
                    <a href="patients.html" class="text-xs text-blue-600 mt-4 font-medium hover:underline block">查看患者 &rarr;</a>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-xs font-medium text-slate-500 uppercase">科普作品总数</p>
                            <h3 class="text-3xl font-bold text-slate-800 mt-2" id="stat-works">-</h3>
                        </div>
                        <div class="p-2 bg-purple-50 text-purple-600 rounded-lg"><i class="fa-solid fa-file-medical"></i></div>
                    </div>
                    <a href="my-works.html" class="text-xs text-blue-600 mt-4 font-medium hover:underline block">查看作品 &rarr;</a>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-xs font-medium text-slate-500 uppercase">已发布</p>
                            <h3 class="text-3xl font-bold text-green-600 mt-2" id="stat-published">-</h3>
                        </div>
                        <div class="p-2 bg-green-50 text-green-600 rounded-lg"><i class="fa-solid fa-globe"></i></div>
                    </div>
                    <a href="library.html" class="text-xs text-blue-600 mt-4 font-medium hover:underline block">查看作品库 &rarr;</a>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition ring-2 ring-orange-100">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-xs font-medium text-slate-500 uppercase">待处理</p>
                            <h3 class="text-3xl font-bold text-orange-500 mt-2" id="stat-pending">-</h3>
                        </div>
                        <div class="p-2 bg-orange-50 text-orange-500 rounded-lg"><i class="fa-solid fa-clock"></i></div>
                    </div>
                    <a href="my-works.html?status=generated" class="text-xs text-blue-600 mt-4 font-medium hover:underline block">立即处理 &rarr;</a>
                </div>
            </div>

            <!-- 数据图表 -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                    <h3 class="font-bold text-slate-800 mb-4">作品状态分布</h3>
                    <div class="relative h-56"><canvas id="chart-status"></canvas></div>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                    <h3 class="font-bold text-slate-800 mb-4">近期创作趋势</h3>
                    <div class="relative h-56"><canvas id="chart-trend"></canvas></div>
                </div>
            </div>

            <!-- 快捷操作 -->
            <div class="flex gap-4 mb-8">
                <a href="prescription.html" class="flex-1 bg-blue-600 text-white p-4 rounded-xl hover:bg-blue-700 transition flex items-center gap-3 shadow-lg shadow-blue-500/20">
                    <i class="fa-solid fa-wand-magic-sparkles text-2xl"></i>
                    <div><p class="font-bold">生成新科普作品</p><p class="text-xs text-blue-200">AI 多模态内容生成</p></div>
                </a>
                <a href="my-works.html" class="flex-1 bg-white border border-slate-200 p-4 rounded-xl hover:bg-slate-50 transition flex items-center gap-3">
                    <i class="fa-solid fa-folder-open text-2xl text-slate-400"></i>
                    <div><p class="font-bold text-slate-800">我的作品</p><p class="text-xs text-slate-500">管理、审核、发布</p></div>
                </a>
            </div>

            <!-- 最近动态 + 待办 -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- 左侧：最近作品动态 -->
                <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                    <h3 class="font-bold text-slate-800 mb-4">最近作品动态</h3>
                    <div id="recent-works" class="space-y-3">
                        <p class="text-slate-400 text-sm">加载中...</p>
                    </div>
                </div>

                <!-- 右侧：待办任务 -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                    <h3 class="font-bold text-slate-800 mb-4">待处理任务</h3>
                    <div id="pending-tasks" class="space-y-3">
                        <p class="text-slate-400 text-sm">加载中...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src=”js/app/sidebar.js”></script>
    <script>
        var statusLabels = {
            generated: '待审核', pending_review: '专家审核中', approved: '已通过',
            published: '已发布', archived: '已归档', changes_requested: '需修改'
        };
        var statusColors = {
            generated: 'bg-blue-100 text-blue-700', pending_review: 'bg-amber-100 text-amber-700',
            approved: 'bg-green-100 text-green-700', published: 'bg-indigo-100 text-indigo-700',
            archived: 'bg-slate-100 text-slate-600', changes_requested: 'bg-red-100 text-red-700'
        };

        document.addEventListener('DOMContentLoaded', loadDashboard);

        async function loadDashboard() {
            var user = JSON.parse(sessionStorage.getItem('mediark_current_user') || 'null');
            var userName = user ? user.name : '医生';
            document.getElementById('greeting-text').textContent = '欢迎回来，' + userName + '！';

            var works = [];
            var patientCount = 0;

            try {
                var res = await fetch('/api/works', { credentials: 'include' });
                if (res.status === 401) { window.location.href = 'Login.html'; return; }
                if (res.ok) { var data = await res.json(); works = data.items || []; }
            } catch (e) {}

            try {
                var res2 = await fetch('/api/patients', { credentials: 'include' });
                if (res2.ok) { var data2 = await res2.json(); patientCount = (data2.items || []).length; }
            } catch (e) {}

            // 统计卡片
            document.getElementById('stat-patients').textContent = patientCount;
            document.getElementById('stat-works').textContent = works.length;
            document.getElementById('stat-published').textContent = works.filter(function(w) { return w.status === 'published'; }).length;
            var pending = works.filter(function(w) { return ['generated', 'pending_review', 'changes_requested'].indexOf(w.status) >= 0; });
            document.getElementById('stat-pending').textContent = pending.length;

            document.getElementById('greeting-sub').textContent = '您已通过 MediArk 创建了 ' + works.length + ' 个科普作品，管理 ' + patientCount + ' 位患者。';

            // 图表渲染
            if (typeof Chart !== 'undefined') {
                // 饼图：作品状态分布
                var statusCanvas = document.getElementById('chart-status');
                if (statusCanvas) {
                    var statusKeys = ['generated', 'pending_review', 'approved', 'published', 'archived', 'changes_requested'];
                    var statusChartLabels = statusKeys.map(function(k) { return statusLabels[k] || k; });
                    var statusChartColors = {
                        generated: '#3B82F6', pending_review: '#F59E0B', approved: '#10B981',
                        published: '#6366F1', archived: '#94A3B8', changes_requested: '#EF4444'
                    };
                    var statusCounts = statusKeys.map(function(k) {
                        return works.filter(function(w) { return w.status === k; }).length;
                    });
                    var hasData = statusCounts.some(function(c) { return c > 0; });

                    if (hasData) {
                        new Chart(statusCanvas, {
                            type: 'doughnut',
                            data: {
                                labels: statusChartLabels,
                                datasets: [{
                                    data: statusCounts,
                                    backgroundColor: statusKeys.map(function(k) { return statusChartColors[k]; }),
                                    borderWidth: 2,
                                    borderColor: '#fff'
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: {
                                    legend: { position: 'right', labels: { boxWidth: 12, padding: 12, font: { size: 12 } } }
                                }
                            }
                        });
                    } else {
                        new Chart(statusCanvas, {
                            type: 'doughnut',
                            data: {
                                labels: ['暂无数据'],
                                datasets: [{
                                    data: [1],
                                    backgroundColor: ['#E2E8F0'],
                                    borderWidth: 0
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: {
                                    legend: { display: false },
                                    tooltip: { enabled: false }
                                }
                            }
                        });
                    }
                }

                // 折线图：近期创作趋势
                var trendCanvas = document.getElementById('chart-trend');
                if (trendCanvas) {
                    var days = [];
                    var dayCounts = [];
                    for (var i = 6; i >= 0; i--) {
                        var d = new Date();
                        d.setDate(d.getDate() - i);
                        var mm = String(d.getMonth() + 1).padStart(2, '0');
                        var dd = String(d.getDate()).padStart(2, '0');
                        var dateStr = mm + '-' + dd;
                        days.push(dateStr);
                        var fullDate = d.toISOString().slice(0, 10);
                        var count = works.filter(function(w) {
                            return w.createdAt && w.createdAt.slice(0, 10) === fullDate;
                        }).length;
                        dayCounts.push(count);
                    }

                    var trendCtx = trendCanvas.getContext('2d');
                    var gradient = trendCtx.createLinearGradient(0, 0, 0, 224);
                    gradient.addColorStop(0, 'rgba(59, 130, 246, 0.2)');
                    gradient.addColorStop(1, 'rgba(59, 130, 246, 0)');

                    new Chart(trendCanvas, {
                        type: 'line',
                        data: {
                            labels: days,
                            datasets: [{
                                label: '创建作品数',
                                data: dayCounts,
                                borderColor: '#3B82F6',
                                backgroundColor: gradient,
                                fill: true,
                                tension: 0.3,
                                pointBackgroundColor: '#3B82F6',
                                pointRadius: 4,
                                pointHoverRadius: 6,
                                borderWidth: 2
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    ticks: { stepSize: 1, font: { size: 11 } },
                                    grid: { color: 'rgba(0,0,0,0.05)' }
                                },
                                x: {
                                    ticks: { font: { size: 11 } },
                                    grid: { display: false }
                                }
                            },
                            plugins: {
                                legend: { display: false }
                            }
                        }
                    });
                }
            }

            // 最近作品动态
            var recentEl = document.getElementById('recent-works');
            var recent = works.slice(0, 6);
            if (!recent.length) {
                recentEl.innerHTML = '<p class=”text-slate-400 text-sm py-4”>暂无作品，<a href=”prescription.html” class=”text-blue-600 underline”>开始创建</a>第一个吧！</p>';
            } else {
                recentEl.innerHTML = recent.map(function(w) {
                    var sc = statusColors[w.status] || 'bg-slate-100 text-slate-600';
                    var sl = statusLabels[w.status] || w.status;
                    var time = w.updatedAt ? new Date(w.updatedAt).toLocaleDateString('zh-CN') : '';
                    return '<a href=”my-works.html” class=”flex items-center justify-between p-3 border border-slate-100 rounded-lg hover:bg-blue-50 transition”>'
                        + '<div class=”flex-1 min-w-0”><p class=”text-sm font-medium text-slate-800 truncate”>' + (w.title || '未命名') + '</p><p class=”text-xs text-slate-500”>' + (w.topic || '') + '</p></div>'
                        + '<div class=”flex items-center gap-2 ml-3”><span class=”px-2 py-0.5 rounded-full text-xs font-semibold ' + sc + '”>' + sl + '</span><span class=”text-xs text-slate-400”>' + time + '</span></div>'
                        + '</a>';
                }).join('');
            }

            // 待办任务
            var pendingEl = document.getElementById('pending-tasks');
            if (!pending.length) {
                pendingEl.innerHTML = '<p class=”text-slate-400 text-sm py-4”>暂无待处理任务</p>';
            } else {
                pendingEl.innerHTML = pending.slice(0, 5).map(function(w) {
                    var sc = statusColors[w.status] || 'bg-slate-100 text-slate-600';
                    var sl = statusLabels[w.status] || w.status;
                    return '<a href=”my-works.html” class=”p-3 border border-slate-100 rounded-lg hover:bg-blue-50 transition block”>'
                        + '<div class=”flex justify-between items-start mb-1”><span class=”text-xs font-bold px-2 py-0.5 rounded ' + sc + '”>' + sl + '</span></div>'
                        + '<p class=”text-sm font-medium text-slate-800”>' + (w.title || '未命名') + '</p>'
                        + '<p class=”text-xs text-slate-500 mt-1”>' + (w.topic || '') + '</p>'
                        + '</a>';
                }).join('');
            }
        }
    </script>
</body>
</html>
