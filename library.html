

<!--
-------------------------------------------------------------------------
[模块名称]: 公众科普资源检索门户 (Public Science Portal)
[文件名称]: library.html (或 index.html)
[开发语言]: HTML5 / JavaScript
[所属子系统]: 公众服务子系统
[功能描述]: 
    1. 提供面向公众的科普作品库展示界面。
    2. 实现基于疾病类型、媒体形式的多维度检索逻辑。
    3. 严格控制访问权限，隔离核心医疗数据。
-------------------------------------------------------------------------

    <style>

            font-family: 'Noto Sans SC', sans-serif;

            <div>

                <a href="index.html#problem" class="hover:text-blue-700">项目痛点</a>

                <a href="index.html#team" class="hover:text-blue-700">关于我们</a>
                <a href="library.html" class="hover:text-blue-700">作品库</a>
            </div>
            
            <div class="hidden md:flex items-center space-x-4">
                <button class="px-6 py-2 font-semibold rounded-full border-2 border-blue-500 text-blue-500 hover:bg-blue-500 hover:text-white transition-colors duration-300 ease-in-out">

    <main>
        <section id="pubmed" class="py-20">
            <div class="container mx-auto px-6">
                <div class="text-center mb-16">
                    <h1 data-aos="fade-up" class="text-4xl font-extrabold text-gray-800">往期成果 & 科普作品库</h1>
                    <p data-aos="fade-up" data-aos-delay="100" class="mt-4 text-gray-600 max-w-2xl mx-auto">
                        我们沉淀了丰富的医学科普创作经验，并致力于构建一个开放、可检索的权威肿瘤科普知识库。
                    </p>
                </div>

                <div data-aos="fade-up" data-aos-delay="200" class="bg-white p-6 rounded-xl shadow-lg mb-12 sticky top-24 z-40">
                <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4 items-end">
                    <div class="lg:col-span-2">
                        <label for="search-input" class="block text-sm font-medium text-gray-700">关键词检索 (标题)</label>
                        <input type="text" id="search-input" placeholder="例如：免疫治疗, CAR-T" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label for="cancer-type-filter" class="block text-sm font-medium text-gray-700">癌症类型</label>
                        <select id="cancer-type-filter" class="mt-1 block w-full px-3 py-2 border border-gray-300 bg-white rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                            <option value="">所有癌症类型</option>
                            <option value="esophageal">食管癌</option>
                            <option value="lung">肺癌</option>
                            <option value="gastric">胃癌</option>
                            <option value="general">通用科普</option>
                        </select>
                    </div>
                    <div>
                        <label for="topic-filter" class="block text-sm font-medium text-gray-700">主题/疾病</label>
                        <select id="topic-filter" class="mt-1 block w-full px-3 py-2 border border-gray-300 bg-white rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                            <option>所有主题</option>
                            <option>肿瘤</option>
                            <option>HPV</option>
                            <option>干细胞</option>
                            <option>疫苗</option>
                            <option>治疗</option>
                            <option>免疫疗法</option>
                            </select>
                    </div>
                    <div>
                        <label for="format-filter" class="block text-sm font-medium text-gray-700">内容形式</label>
                        <select id="format-filter" class="mt-1 block w-full px-3 py-2 border border-gray-300 bg-white rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                            <option>所有形式</option>
                            <option>视频</option>
                            <option>漫画</option>
                            <option>图片</option>
                            <option>访谈/讲座</option>
                        </select>
                    </div>
                    <div>
                        <label for="audience-filter" class="block text-sm font-medium text-gray-700">目标受众</label>
                        <select id="audience-filter" class="mt-1 block w-full px-3 py-2 border border-gray-300 bg-white rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                            <option>所有受众</option>
                            <option>患者本人</option>
                            <option>患者家属</option>
                            <option>普通大众</option>
                            <option>基层医生</option>
                        </select>
                    </div>
                </div>
            </div>

                <!-- 批量操作工具栏（仅登录医生可见）-->
                <div id="bulk-toolbar" class="hidden mb-6 bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex items-center gap-3">
                    <label class="flex items-center gap-2 text-sm text-slate-700 cursor-pointer">
                        <input type="checkbox" id="bulk-select-all" class="w-4 h-4">
                        <span>全选</span>
                    </label>
                    <span id="bulk-count" class="text-xs text-slate-500">已选 0 项</span>
                    <div class="flex-1"></div>
                    <button id="bulk-delete-btn" onclick="bulkDelete()" disabled class="px-4 py-2 bg-red-50 text-red-600 rounded-lg text-sm font-medium hover:bg-red-100 transition disabled:opacity-40 disabled:cursor-not-allowed">
                        <i class="fa fa-trash mr-1"></i>删除选中
                    </button>
                </div>

                <div id="results-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-blue-900 text-white py-10">
        <div class="container mx-auto px-6 text-center">
            <p class="text-lg font-semibold">「智瘤方舟」MediArk</p>
            <p class="mt-2 text-gray-300">成为守护肿瘤患者认知健康的“诺亚方舟”</p>
            <p class="mt-4 text-gray-400 text-sm">由 薪火承梦 团队倾力打造</p>
        </div>
    </footer>
     <div id="modal-container" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50 hidden">
        <div id="modal-content" class="bg-white rounded-2xl shadow-xl w-full max-w-3xl max-h-[90vh] flex flex-col relative">
            <div class="flex justify-between items-center p-6 border-b border-gray-200">
                <h3 id="modal-title" class="text-2xl font-bold text-gray-800">作品标题</h3>
                <button id="modal-close-btn" class="text-gray-400 hover:text-gray-800 transition-colors">
                    <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="modal-body" class="p-6 overflow-y-auto">
                </div>
            <div id="modal-tags" class="p-6 border-t border-gray-200 bg-gray-50 rounded-b-2xl">
                </div>
        </div>
    </div>

    <script>
        AOS.init({
            duration: 800,
            once: true,
        });
    </script>
<script>
    // --- 页面加载完成后再执行所有JS逻辑 ---
    document.addEventListener('DOMContentLoaded', () => {

        // --- 全局变量定义 ---
        const resultsGrid = document.getElementById('results-grid');
        const searchInput = document.getElementById('search-input');
        const cancerTypeFilter = document.getElementById('cancer-type-filter');
        const topicFilter = document.getElementById('topic-filter');
        const formatFilter = document.getElementById('format-filter');
        const audienceFilter = document.getElementById('audience-filter');
        let allWorks = [];
        let currentUser = null;
        let selectedIds = new Set();

        // --- Modal 相关的元素 ---
        const modalContainer = document.getElementById('modal-container');
        const modalTitle = document.getElementById('modal-title');
        const modalBody = document.getElementById('modal-body');
        const modalTags = document.getElementById('modal-tags');
        const modalCloseBtn = document.getElementById('modal-close-btn'); // **新增：确保关闭按钮也被获取**

        const tagColors = {
            topic: 'bg-blue-100 text-blue-800',
            format: 'bg-green-100 text-green-800',
            audience: 'bg-indigo-100 text-indigo-800',
            purpose: 'bg-pink-100 text-pink-800'
        };

        // --- 渲染函数 ---
        function renderWorks(workList) {
            resultsGrid.innerHTML = '';
            if (!workList.length) {
                resultsGrid.innerHTML = '<p class="col-span-3 text-center text-slate-500 py-12">暂无已发布的科普作品</p>';
                return;
            }
            workList.forEach(work => {
                // 兼容静态 works.json 和 API 格式
                const coverImg = work.coverImage || work.image || '';
                const summary = work.summary || '';
                // API 作品 id 是 "api-xxx" 格式，仅这些才能被批量删除
                const isApiWork = typeof work.id === 'string' && work.id.startsWith('api-');
                const canDelete = currentUser && isApiWork && (currentUser.role === 'admin' || work.createdBy === currentUser.id);
                const checkboxHtml = canDelete
                    ? `<label class="absolute top-3 left-3 z-10 w-7 h-7 bg-white rounded-full shadow-md flex items-center justify-center cursor-pointer" onclick="event.stopPropagation()"><input type="checkbox" class="bulk-checkbox w-4 h-4" data-id="${work.id}" onchange="toggleSelected('${work.id}', this.checked)"></label>`
                    : '';
                let tagsHTML = '';
                const dimensions = ['topic', 'format', 'audience'];
                dimensions.forEach(dimension => {
                    if (work[dimension]) {
                        const colorClass = tagColors[dimension] || 'bg-gray-200 text-gray-800';
                        const tagsArray = String(work[dimension]).split(',').map(tag => tag.trim());
                        tagsHTML += tagsArray.map(tag => `<span class="px-2 py-1 ${colorClass} text-xs font-semibold rounded-full">${tag}</span>`).join(' ');
                    }
                });
                resultsGrid.innerHTML += `
                    <div data-id="${work.id}" class="relative bg-white rounded-xl shadow-md overflow-hidden hover:shadow-2xl transition-shadow duration-300 cursor-pointer">
                        ${checkboxHtml}
                        ${coverImg
                            ? `<img class="w-full h-48 object-cover pointer-events-none" src="${coverImg}" alt="${work.title}">`
                            : `<div class="w-full h-48 bg-gradient-to-br from-blue-50 to-slate-100 flex items-center justify-center pointer-events-none"><i class="fa-solid fa-file-medical text-4xl text-blue-200"></i></div>`
                        }
                        <div class="p-6 pointer-events-none">
                            <div class="flex flex-wrap gap-2 mb-3">${tagsHTML}</div>
                            <h3 class="text-xl font-bold text-gray-800 mb-2">${work.title}</h3>
                            ${summary ? `<p class="text-sm text-gray-600 mb-2 line-clamp-2">${summary}</p>` : ''}
                            <p class="font-semibold text-blue-600">查看详情 &rarr;</p>
                        </div>
                    </div>
                `;
            });
        }

        // --- 筛选函数 ---
        function applyFilters() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedCancerType = cancerTypeFilter.value;
            const selectedTopic = topicFilter.value;
            const selectedFormat = formatFilter.value;
            const selectedAudience = audienceFilter.value;
            let filteredWorks = allWorks;
            if (searchTerm) { filteredWorks = filteredWorks.filter(w => w.title.toLowerCase().includes(searchTerm)); }
            if (selectedCancerType) { filteredWorks = filteredWorks.filter(w => (w.cancerType || 'general') === selectedCancerType); }
            if (selectedTopic !== '所有主题') { filteredWorks = filteredWorks.filter(w => w.topic && w.topic.split(',').map(t=>t.trim()).includes(selectedTopic)); }
            if (selectedFormat !== '所有形式') { filteredWorks = filteredWorks.filter(w => w.format && w.format.split(',').map(t=>t.trim()).includes(selectedFormat)); }
            if (selectedAudience !== '所有受众') { filteredWorks = filteredWorks.filter(w => w.audience && w.audience.split(',').map(t=>t.trim()).includes(selectedAudience)); }
            renderWorks(filteredWorks);
        }

        // --- Modal 控制函数 ---
        function openModal(work) {
            // ... (这部分函数内容不变)
            modalTitle.textContent = work.title;
            let tagsHTML = '';
            const dimensions = ['topic', 'format', 'audience', 'purpose'];
            dimensions.forEach(dimension => {
                if (work[dimension]) {
                    const colorClass = tagColors[dimension] || 'bg-gray-200 text-gray-800';
                    const tagsArray = work[dimension].split(',').map(tag => tag.trim());
                    tagsHTML += tagsArray.map(tag => `<span class="px-2 py-1 ${colorClass} text-xs font-semibold rounded-full">${tag}</span>`).join(' ');
                }
            });
            modalTags.innerHTML = tagsHTML;

            // 兼容静态 JSON 和 API 格式
            let contentHTML = '';

            // API 格式：展示 summary + assets
            if (work.summary) {
                contentHTML += `<p class="text-gray-700 mb-4">${work.summary}</p>`;
            }
            if (work.assets && work.assets.length) {
                work.assets.forEach(asset => {
                    if (asset.assetType === 'image' && asset.url) {
                        contentHTML += `<img src="${asset.url}" alt="${asset.assetKey}" class="w-full rounded-lg mb-4 max-h-[50vh] object-contain">`;
                    } else if (asset.assetType === 'video' && asset.url) {
                        contentHTML += `<video class="w-full rounded-lg mb-4" controls><source src="${asset.url}" type="video/mp4"></video>`;
                    }
                });
            }

            // 静态 JSON 格式 fallback
            if (!contentHTML && work.type === 'video' && work.contentUrl) {
                contentHTML = `<video class="w-full rounded-lg" controls><source src="${work.contentUrl}" type="video/mp4"></video>`;
            } else if (!contentHTML && work.type === 'image' && work.contentUrl) {
                contentHTML = `<img src="${work.contentUrl}" alt="${work.title}" class="w-full rounded-lg max-h-[60vh] object-contain">`;
            } else if (!contentHTML && work.type === 'pdf' && work.contentUrl) {
                contentHTML = `<a href="${work.contentUrl}" target="_blank" class="inline-block bg-blue-600 text-white font-bold px-8 py-3 rounded-full">打开PDF</a>`;
            }

            if (!contentHTML) {
                contentHTML = '<p class="text-gray-500 text-center py-8">暂无预览内容</p>';
            }

            modalBody.innerHTML = contentHTML;
            modalContainer.classList.remove('hidden');
        }

        function closeModal() {
            // ... (这部分函数内容不变)
            modalContainer.classList.add('hidden');
            const videoElement = modalBody.querySelector('video');
            if (videoElement) {
                videoElement.pause();
                videoElement.currentTime = 0;
            }
            modalBody.innerHTML = '';
        }

        // --- 批量选择功能 ---
        window.toggleSelected = function(id, checked) {
            if (checked) selectedIds.add(String(id));
            else selectedIds.delete(String(id));
            updateBulkToolbar();
        };

        function updateBulkToolbar() {
            const countEl = document.getElementById('bulk-count');
            const btnEl = document.getElementById('bulk-delete-btn');
            const count = selectedIds.size;
            if (countEl) countEl.textContent = `已选 ${count} 项`;
            if (btnEl) btnEl.disabled = count === 0;
        }

        window.bulkDelete = async function() {
            if (!selectedIds.size) return;
            const ids = [...selectedIds].map(s => Number(String(s).replace(/^api-/, ''))).filter(Boolean);
            if (!confirm(`确认删除 ${ids.length} 个作品？\n删除后将从作品库移除，您仍可在「我的作品」中找到并恢复。`)) return;

            try {
                const res = await fetch('/api/works/bulk-archive', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids })
                });
                if (!res.ok) throw new Error('删除失败 (' + res.status + ')');
                const data = await res.json();
                alert(`成功删除 ${data.archived.length} 项${data.skipped.length ? `，跳过 ${data.skipped.length} 项（无权限或不存在）` : ''}`);
                selectedIds.clear();
                // 重新加载列表
                loadData();
            } catch (err) {
                alert('删除失败：' + (err.message || err));
            }
        };

        // --- 绑定所有事件监听器 ---
        searchInput.addEventListener('input', applyFilters);
        cancerTypeFilter.addEventListener('change', applyFilters);
        topicFilter.addEventListener('change', applyFilters);
        formatFilter.addEventListener('change', applyFilters);
        audienceFilter.addEventListener('change', applyFilters);

        document.getElementById('bulk-select-all').addEventListener('change', function(e) {
            const boxes = document.querySelectorAll('.bulk-checkbox');
            boxes.forEach(box => {
                box.checked = e.target.checked;
                toggleSelected(box.dataset.id, e.target.checked);
            });
        });
        
        modalCloseBtn.addEventListener('click', closeModal);
        modalContainer.addEventListener('click', (event) => {
            if (event.target === modalContainer) { closeModal(); }
        });

        resultsGrid.addEventListener('click', (event) => {
            const card = event.target.closest('[data-id]');
            if (card) {
                event.preventDefault();
                const workId = card.dataset.id;
                const clickedWork = allWorks.find(work => work.id == workId);
                if (clickedWork) {
                    openModal(clickedWork);
                }
            }
        });

        // --- 初始化：先检测登录态，再加载作品 ---
        async function loadData() {
            selectedIds.clear();
            updateBulkToolbar();
            const [userData, staticWorks, apiWorks] = await Promise.all([
                fetch('/api/auth/me', { credentials: 'include' })
                    .then(r => r.ok ? r.json() : null)
                    .catch(() => null),
                fetch('works.json').then(r => r.json()).catch(() => []),
                fetch('/api/library/works', { credentials: 'include' })
                    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
                    .then(d => d.items || [])
                    .catch(() => [])
            ]);

            currentUser = userData?.user || null;
            // 只有登录的医生或管理员才显示批量工具栏
            if (currentUser && (currentUser.role === 'doctor' || currentUser.role === 'admin')) {
                document.getElementById('bulk-toolbar').classList.remove('hidden');
            } else {
                document.getElementById('bulk-toolbar').classList.add('hidden');
            }

            // API 作品 ID 加前缀避免与静态 ID 冲突
            apiWorks.forEach(w => { w.id = 'api-' + w.id; });
            allWorks = [...apiWorks, ...staticWorks];
            applyFilters();

            // 二维码扫码跳转：自动打开指定作品
            const highlightId = new URLSearchParams(window.location.search).get('highlight');
            if (highlightId) {
                const target = allWorks.find(w => w.id == highlightId || w.id == 'api-' + highlightId);
                if (target) { setTimeout(() => openModal(target), 500); }
            }
        }
        window.loadData = loadData;
        loadData();

    }); // DOMContentLoaded 结束
</script>
</body>
</html>
