    <main>
        <section id="pubmed" class="py-20">
            <div class="container mx-auto px-6">

                    <h1 data-aos="fade-up" class="text-4xl font-extrabold text-gray-800">往期成果 & 科普作品库</h1>
                    <p data-aos="fade-up" data-aos-delay="100" class="mt-4 text-gray-600 max-w-2xl mx-auto">

     <div id="modal-container" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50 hidden">
        <div id="modal-content" class="bg-white rounded-2xl shadow-xl w-full max-w-3xl max-h-[90vh] flex flex-col relative">
            <div class="flex justify-between items-center p-6 border-b border-gray-200">
                <h3 id="modal-title" class="text-2xl font-bold text-gray-800">作品标题</h3>
                <button id="modal-close-btn" class="text-gray-400 hover:text-gray-800 transition-colors">
                    <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="modal-body" class="p-6 overflow-y-auto">
                </div>
            <div id="modal-tags" class="p-6 border-t border-gray-200 bg-gray-50 rounded-b-2xl">
                </div>
        </div>
    </div>

    <script>
        AOS.init({
            duration: 800,
            once: true,
        });
    </script>
<script>
    // --- 页面加载完成后再执行所有JS逻辑 ---
    document.addEventListener('DOMContentLoaded', () => {

        // --- 全局变量定义 ---
        const resultsGrid = document.getElementById('results-grid');
        const searchInput = document.getElementById('search-input');
        const topicFilter = document.getElementById('topic-filter');
        const formatFilter = document.getElementById('format-filter');
        const audienceFilter = document.getElementById('audience-filter');
        let allWorks = []; 

        // --- Modal 相关的元素 ---
        const modalContainer = document.getElementById('modal-container');
        const modalTitle = document.getElementById('modal-title');
        const modalBody = document.getElementById('modal-body');
        const modalTags = document.getElementById('modal-tags');
        const modalCloseBtn = document.getElementById('modal-close-btn'); // **新增：确保关闭按钮也被获取**

        const tagColors = {
            topic: 'bg-blue-100 text-blue-800',
            format: 'bg-green-100 text-green-800',
            audience: 'bg-indigo-100 text-indigo-800',
            purpose: 'bg-pink-100 text-pink-800'
        };

        // --- 渲染函数 ---
        function renderWorks(workList) {
            resultsGrid.innerHTML = '';
            workList.forEach(work => {
                let tagsHTML = '';
                const dimensions = ['topic', 'format', 'audience', 'purpose'];
                dimensions.forEach(dimension => {
                    if (work[dimension]) {
                        const colorClass = tagColors[dimension] || 'bg-gray-200 text-gray-800';
                        const tagsArray = work[dimension].split(',').map(tag => tag.trim());
                        tagsHTML += tagsArray.map(tag => `<span class="px-2 py-1 ${colorClass} text-xs font-semibold rounded-full">${tag}</span>`).join(' ');
                    }
                });
                resultsGrid.innerHTML += `
                    <div data-id="${work.id}" class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-2xl transition-shadow duration-300 cursor-pointer">
                        <img class="w-full h-48 object-cover pointer-events-none" src="${work.image}" alt="${work.title}">
                        <div class="p-6 pointer-events-none">
                            <div class="flex flex-wrap gap-2 mb-3">${tagsHTML}</div>
                            <h3 class="text-xl font-bold text-gray-800 mb-2">${work.title}</h3>
                            <p class="font-semibold text-blue-600">查看详情 &rarr;</p>
                        </div>
                    </div>
                `;
            });
        }

        // --- 筛选函数 ---
        function applyFilters() {
            // ... (这部分函数内容不变)
            const searchTerm = searchInput.value.toLowerCase();
            const selectedTopic = topicFilter.value;
            const selectedFormat = formatFilter.value;
            const selectedAudience = audienceFilter.value;
            let filteredWorks = allWorks;
            if (searchTerm) { filteredWorks = filteredWorks.filter(w => w.title.toLowerCase().includes(searchTerm)); }
            if (selectedTopic !== '所有主题') { filteredWorks = filteredWorks.filter(w => w.topic && w.topic.split(',').map(t=>t.trim()).includes(selectedTopic)); }
            if (selectedFormat !== '所有形式') { filteredWorks = filteredWorks.filter(w => w.format && w.format.split(',').map(t=>t.trim()).includes(selectedFormat)); }
            if (selectedAudience !== '所有受众') { filteredWorks = filteredWorks.filter(w => w.audience && w.audience.split(',').map(t=>t.trim()).includes(selectedAudience)); }
            renderWorks(filteredWorks);
        }

        // --- Modal 控制函数 ---
        function openModal(work) {
            // ... (这部分函数内容不变)
            modalTitle.textContent = work.title;
            let tagsHTML = '';
            const dimensions = ['topic', 'format', 'audience', 'purpose'];
            dimensions.forEach(dimension => {
                if (work[dimension]) {
                    const colorClass = tagColors[dimension] || 'bg-gray-200 text-gray-800';
                    const tagsArray = work[dimension].split(',').map(tag => tag.trim());
                    tagsHTML += tagsArray.map(tag => `<span class="px-2 py-1 ${colorClass} text-xs font-semibold rounded-full">${tag}</span>`).join(' ');
                }
            });
            modalTags.innerHTML = tagsHTML;
            let contentHTML = '';
            if (work.type === 'video') {
                contentHTML = `<video class="w-full rounded-lg" controls autoplay><source src="${work.contentUrl}" type="video/mp4">您的浏览器不支持播放视频。</video>`;
            } else if (work.type === 'pdf') {
                contentHTML = `<div class="text-center p-8 bg-gray-100 rounded-lg"><p class="text-lg text-gray-700 mb-4">这是一个PDF漫画/文档作品。</p><a href="${work.contentUrl}" target="_blank" class="inline-block bg-blue-600 text-white font-bold px-8 py-3 rounded-full hover:bg-blue-700 transition-colors">在新标签页中打开PDF</a></div>`;
            } else if (work.type === 'image') {
                contentHTML = `<img src="${work.contentUrl}" alt="${work.title}" class="w-full h-auto rounded-lg max-h-[60vh] object-contain">`;
            }
            modalBody.innerHTML = contentHTML;
            modalContainer.classList.remove('hidden');
        }

        function closeModal() {
            // ... (这部分函数内容不变)
            modalContainer.classList.add('hidden');
            const videoElement = modalBody.querySelector('video');
            if (videoElement) {
                videoElement.pause();
                videoElement.currentTime = 0;
            }
            modalBody.innerHTML = '';
        }

        // --- 绑定所有事件监听器 ---
        searchInput.addEventListener('input', applyFilters);
        topicFilter.addEventListener('change', applyFilters);
        formatFilter.addEventListener('change', applyFilters);
        audienceFilter.addEventListener('change', applyFilters);
        
        modalCloseBtn.addEventListener('click', closeModal);
        modalContainer.addEventListener('click', (event) => {
            if (event.target === modalContainer) { closeModal(); }
        });

        resultsGrid.addEventListener('click', (event) => {
            const card = event.target.closest('[data-id]');
            if (card) {
                event.preventDefault();
                const workId = card.dataset.id;
                const clickedWork = allWorks.find(work => work.id == workId);
                if (clickedWork) {
                    openModal(clickedWork);
                }
            }
        });

        // --- 初始化：获取JSON数据 ---
        fetch('works.json')
            .then(response => response.json())
            .then(data => {
                allWorks = data;
                renderWorks(allWorks);
            })
            .catch(error => {
                console.error('加载作品数据时出错:', error);
                resultsGrid.innerHTML = '<p class="text-red-500">加载作品库失败，请检查文件。</p>';
            });

    }); // DOMContentLoaded 结束
</script>
