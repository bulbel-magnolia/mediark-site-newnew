<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediArk Published Library</title>
  <link rel="stylesheet" href="styles/mediark-app.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
  <div class="shell-main">
    <header class="topbar">
      <div>
        <p class="eyebrow">Public Library</p>
        <h1 class="page-title" style="font-size: 2.6rem;">已发布科普作品库</h1>
      </div>
      <div class="topbar-actions">
        <a class="button-ghost" href="Login.html">平台登录</a>
      </div>
    </header>

    <div class="page-wrap section-stack">
      <section class="hero-card">
        <div class="hero-grid">
          <div>
            <p class="eyebrow">Published Only</p>
            <h2 class="page-title" style="font-size: 2.8rem;">只展示通过审核并正式发布的作品</h2>
            <p class="body-muted" style="max-width: 760px;">
              公开库只暴露作品级内容，不暴露内部审核轨迹、账号信息或原始医疗数据。适合比赛展示和对外演示。
            </p>
          </div>
          <div class="panel-card">
            <p class="meta-text">当前公开作品数</p>
            <h3 class="page-title" id="library-count" style="font-size: 3rem; margin-top: 12px;">0</h3>
            <p class="body-muted">可按主题、形式、受众和关键字筛选。</p>
          </div>
        </div>
      </section>

      <section class="form-card">
        <div class="field-row">
          <div class="field">
            <label for="search-input">关键词</label>
            <input id="search-input" type="text" placeholder="按标题或摘要搜索">
          </div>
          <div class="field">
            <label for="topic-filter">Topic</label>
            <select id="topic-filter"></select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="format-filter">Format</label>
            <select id="format-filter"></select>
          </div>
          <div class="field">
            <label for="audience-filter">Audience</label>
            <select id="audience-filter"></select>
          </div>
        </div>
      </section>

      <section id="gallery-grid" class="gallery-grid"></section>
    </div>
  </div>

  <div id="modal-root" class="modal">
    <div class="modal-panel">
      <div class="inline-actions" style="justify-content: space-between; align-items: center;">
        <h2 id="modal-title" class="section-title">Work Detail</h2>
        <button id="modal-close" class="button-ghost">关闭</button>
      </div>
      <div id="modal-body" style="margin-top: 18px;"></div>
    </div>
  </div>

  <script type="module" src="js/app/library-client.js"></script>
</body>
</html>
