<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 智瘤方舟 MediArk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', system-ui, -apple-system, sans-serif; }
        .sidebar-item:hover { background: rgba(255, 255, 255, 0.1); }
        .sidebar-item.active { background: rgba(255, 255, 255, 0.15); border-right: 3px solid #60a5fa; }
        .table-row:hover { background: #f8fafc; }
        .btn-action { transition: all 0.2s ease; }
        .btn-action:hover { transform: translateY(-1px); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex min-h-screen">
        <!-- 侧边栏 -->
        <aside class="w-16 lg:w-56 bg-gradient-to-b from-slate-800 to-slate-900 flex flex-col fixed h-full z-20">
            <div class="h-16 flex items-center justify-center lg:justify-start lg:px-4 border-b border-slate-700">
                <div class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-heart-pulse w-5 h-5 text-white"></i>
                </div>
                <span class="hidden lg:block ml-3 text-white font-bold">智瘤方舟</span>
            </div>
            <nav class="flex-1 py-4">
                <a href="#" class="sidebar-item flex items-center justify-center lg:justify-start h-12 lg:px-4 text-slate-400 hover:text-white transition-colors">
                    <i class="fa-solid fa-chart-pie w-5 h-5"></i>
                    <span class="hidden lg:block ml-3 text-sm">工作台</span>
                </a>
                <a href="#" class="sidebar-item active flex items-center justify-center lg:justify-start h-12 lg:px-4 text-white transition-colors">
                    <i class="fa-solid fa-user-group w-5 h-5"></i>
                    <span class="hidden lg:block ml-3 text-sm">用户管理</span>
                </a>
            </nav>
            <div class="p-2 lg:p-4 border-t border-slate-700">
                <button onclick="logout()" class="w-full flex items-center justify-center lg:justify-start h-10 lg:px-2 text-slate-400 hover:text-white transition-colors rounded-lg hover:bg-slate-700">
                    <i class="fa-solid fa-right-from-bracket w-5 h-5"></i>
                    <span class="hidden lg:block ml-3 text-sm">退出登录</span>
                </button>
            </div>
        </aside>
        
        <!-- 主内容区 -->
        <main class="flex-1 ml-16 lg:ml-56">
            <!-- 顶部栏 -->
            <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 sticky top-0 z-10">
                <div class="flex items-center text-sm">
                    <span class="text-gray-400">后台管理</span>
                    <i class="fa-solid fa-chevron-right w-4 h-4 text-gray-400 mx-2"></i>
                    <span class="text-gray-800 font-medium">医师账户管理</span>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-sm text-gray-600" id="adminNameDisplay">管理员</span>
                    <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-shield-halved w-4 h-4 text-blue-600"></i>
                    </div>
                </div>
            </header>
            
            <!-- 页面内容 -->
            <div class="p-6">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200">
                    <!-- 头部与搜索 -->
                    <div class="p-6 border-b border-gray-100">
                        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                            <div>
                                <h2 class="text-lg font-semibold text-gray-800">注册医师列表</h2>
                                <p class="text-sm text-gray-500 mt-1">查看并管理已注册的医生账号权限</p>
                            </div>
                            <div class="flex gap-2">
                                <div class="relative">
                                    <i class="fa-solid fa-magnifying-glass w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
                                    <input type="text" id="searchInput" placeholder="搜索姓名/工号..." 
                                           class="pl-9 pr-4 py-2 w-48 lg:w-64 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                                </div>
                                <button onclick="searchUsers()" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2">
                                    <i class="fa-solid fa-magnifying-glass w-4 h-4"></i>
                                    查询
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 数据表格 -->
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="bg-gray-50 border-b border-gray-100">
                                    <th class="text-left py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">用户名</th>
                                    <th class="text-left py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">显示名称</th>
                                    <th class="text-left py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">注册时间</th>
                                    <th class="text-left py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">状态</th>
                                    <th class="text-left py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">角色</th>
                                    <th class="text-left py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">操作</th>
                                </tr>
                            </thead>
                            <tbody id="userTableBody">
                                <!-- 数据由JS渲染 -->
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- 底部统计 -->
                    <div class="p-4 border-t border-gray-100 flex items-center justify-between">
                        <span class="text-sm text-gray-500">共 <span id="totalCount">0</span> 条注册记录</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- 重置密码确认弹窗 -->
    <div id="resetModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden backdrop-blur-sm">
        <div class="bg-white rounded-xl p-6 w-full max-w-sm mx-4 shadow-2xl animate-fade-in-up">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 bg-amber-100 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-key w-5 h-5 text-amber-600"></i>
                </div>
                <h3 class="text-lg font-semibold text-gray-800">重置密码</h3>
            </div>
            <p class="text-gray-600 mb-6">确定要重置用户 <span id="resetUserName" class="font-medium text-gray-800"></span> 的密码吗？<br>重置后密码将变为 <span class="font-mono bg-gray-100 px-1 rounded">123456</span>。</p>
            <div class="flex gap-3 justify-end">
                <button onclick="closeModal('resetModal')" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">取消</button>
                <button onclick="confirmReset()" class="px-4 py-2 bg-amber-500 text-white rounded-lg hover:bg-amber-600 transition-colors">确认重置</button>
            </div>
        </div>
    </div>
    
    <!-- 删除用户确认弹窗 -->
    <div id="deleteModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden backdrop-blur-sm">
        <div class="bg-white rounded-xl p-6 w-full max-w-sm mx-4 shadow-2xl animate-fade-in-up">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-trash w-5 h-5 text-red-600"></i>
                </div>
                <h3 class="text-lg font-semibold text-gray-800">删除用户</h3>
            </div>
            <p class="text-gray-600 mb-6">确定要永久删除用户 <span id="deleteUserName" class="font-medium text-gray-800"></span> 吗？<br><span class="text-red-500 text-xs">此操作将同时清除该医生的所有登录权限。</span></p>
            <div class="flex gap-3 justify-end">
                <button onclick="closeModal('deleteModal')" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">取消</button>
                <button onclick="confirmDelete()" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors">确认删除</button>
            </div>
        </div>
    </div>
    
    <script>
        

        let allUsers = [];
        let currentActionUserId = null; // 后端使用 numeric id

        // 1. 权限检查 & 初始化 (后端优先，fallback 到 sessionStorage)
        window.addEventListener('DOMContentLoaded', async () => {
            // 先尝试后端 API
            try {
                const res = await fetch('/api/auth/me', { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    if (data.user.role !== 'admin') { alert('需要管理员权限'); window.location.href = 'Login.html'; return; }
                    document.getElementById('adminNameDisplay').innerText = data.user.displayName || '管理员';
                    sessionStorage.setItem('mediark_current_user', JSON.stringify({
                        id: data.user.id, name: data.user.displayName,
                        username: data.user.username, role: data.user.role
                    }));
                    loadData();
                    return;
                }
            } catch (e) { /* 后端不可用，继续 fallback */ }

            // Fallback: 从 sessionStorage 检查
            const session = JSON.parse(sessionStorage.getItem('mediark_current_user') || 'null');
            if (session && session.role === 'admin') {
                document.getElementById('adminNameDisplay').innerText = session.name || '管理员';
                loadData();
            } else {
                alert('请先以管理员身份登录。');
                window.location.href = 'Login.html';
            }
        });

        // 2. 读取用户列表（后端优先，fallback 到 localStorage）
        async function loadData() {
            try {
                const res = await fetch('/api/users', { credentials: 'include' });
                if (!res.ok) throw new Error('加载失败');
                const data = await res.json();
                allUsers = data.items || data.users || [];
                renderTable(allUsers);
            } catch (err) {
                // Fallback: 从 localStorage 读取注册用户
                const stored = localStorage.getItem('mediark_users');
                allUsers = stored ? JSON.parse(stored) : [];
                renderTable(allUsers);
            }
        }

        // 3. 渲染表格 (适配后端 API 字段)
        function renderTable(data) {
            const tbody = document.getElementById('userTableBody');

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-gray-400">暂无注册用户数据</td></tr>`;
                document.getElementById('totalCount').innerText = 0;
                return;
            }

            const roleLabels = { admin: '管理员', doctor: '临床医生' };
            const statusColors = { 1: 'bg-green-100 text-green-700', 0: 'bg-red-100 text-red-700' };

            tbody.innerHTML = data.map(user => {
                const name = user.displayName || user.display_name || user.username;
                const initial = name ? name[0].toUpperCase() : '?';
                const roleLabel = roleLabels[user.role] || user.role;
                const isActive = user.isActive !== undefined ? user.isActive : user.is_active;
                const activeLabel = isActive ? '正常' : '已禁用';
                const activeColor = isActive ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700';
                const rawDate = user.createdAt || user.created_at;
                const createdDate = rawDate ? new Date(rawDate).toLocaleDateString('zh-CN') : '-';

                return `
                <tr class="table-row border-b border-gray-50 transition-colors">
                    <td class="py-4 px-6">
                        <span class="text-sm font-mono text-gray-600">${user.username}</span>
                    </td>
                    <td class="py-4 px-6">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center">
                                <span class="text-sm font-medium text-blue-600">${initial}</span>
                            </div>
                            <span class="text-sm font-medium text-gray-800">${name}</span>
                        </div>
                    </td>
                    <td class="py-4 px-6">
                        <span class="text-sm text-gray-600">${createdDate}</span>
                    </td>
                    <td class="py-4 px-6">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${activeColor}">${activeLabel}</span>
                    </td>
                    <td class="py-4 px-6">
                         <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-700">${roleLabel}</span>
                    </td>
                    <td class="py-4 px-6">
                        <div class="flex gap-2">
                            <button onclick="showResetModal(${user.id}, '${name}')"
                                    class="btn-action px-3 py-1.5 text-xs font-medium text-amber-600 border border-amber-300 rounded-lg hover:bg-amber-50 transition-colors">
                                重置密码
                            </button>
                            <button onclick="showDeleteModal(${user.id}, '${name}')"
                                    class="btn-action px-3 py-1.5 text-xs font-medium text-red-600 border border-red-300 rounded-lg hover:bg-red-50 transition-colors">
                                禁用
                            </button>
                        </div>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('totalCount').textContent = data.length;
            
        }
        
        // 4. 搜索功能
        function searchUsers() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!keyword) {
                renderTable(allUsers);
                return;
            }
            const filtered = allUsers.filter(u =>
                (u.display_name && u.display_name.toLowerCase().includes(keyword)) ||
                (u.username && u.username.toLowerCase().includes(keyword))
            );
            renderTable(filtered);
        }

        // 5. 弹窗控制逻辑
        function showResetModal(userId, name) {
            currentActionUserId = userId;
            document.getElementById('resetUserName').textContent = name;
            document.getElementById('resetModal').classList.remove('hidden');
        }

        function showDeleteModal(userId, name) {
            currentActionUserId = userId;
            document.getElementById('deleteUserName').textContent = name;
            document.getElementById('deleteModal').classList.remove('hidden');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
            currentActionUserId = null;
        }

        // 6. 核心操作：重置密码 (调用后端 API)
        async function confirmReset() {
            if (!currentActionUserId) return;
            try {
                const res = await fetch(`/api/users/${currentActionUserId}`, {
                    method: 'PATCH',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: '123456' })
                });
                if (!res.ok) throw new Error('重置失败');
                alert('密码已重置为: 123456');
                closeModal('resetModal');
            } catch (err) {
                alert('操作失败：' + err.message);
            }
        }

        // 7. 核心操作：禁用用户 (调用后端 API)
        async function confirmDelete() {
            if (!currentActionUserId) return;
            try {
                const res = await fetch(`/api/users/${currentActionUserId}`, {
                    method: 'PATCH',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ isActive: false })
                });
                if (!res.ok) throw new Error('禁用失败');
                closeModal('deleteModal');
                loadData(); // 刷新列表
            } catch (err) {
                alert('操作失败：' + err.message);
            }
        }

        // 8. 退出登录 (调用后端 API)
        async function logout() {
            if (!confirm('确定要退出管理后台吗？')) return;
            try {
                await fetch('/api/auth/logout', { method: 'POST', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: '{}' });
            } finally {
                sessionStorage.removeItem('mediark_current_user');
                window.location.href = 'Login.html';
            }
        }
        
        // 回车搜索支持
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchUsers();
        });
    </script>
</body>
</html>
