<!--
-------------------------------------------------------------------------
[模块名称]: 医护人员注册入驻流程 (Doctor Registration)
[文件名称]: register.html
[开发语言]: HTML5 / JavaScript
[所属子系统]: 用户管理子系统
[功能描述]: 
    1. 采集医生基础信息（姓名、工号、医院）。
    2. 执行前端格式校验与防重复提交逻辑。
-------------------------------------------------------------------------
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册账户 - 智瘤方舟 (MediArk)</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        blue: {
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* 复用 Login 页面的样式定义 */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .input-focus:focus {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            transform: translateY(-1px);
        }
        /* 隐藏滚动条但允许滚动（针对小屏幕） */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 动画 */
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen bg-gray-900 font-sans">
    
    <!-- 全屏背景图 (保持一致) -->
    <div class="fixed inset-0 z-0">
        <img src="网页展示素材库/login_bg.jpg" alt="MediArk Background" 
             class="w-full h-full object-cover">
        <!-- 遮罩 -->
        <div class="absolute inset-0 bg-black/30"></div>
    </div>
    
    <!-- 主容器 -->
    <div class="relative z-10 min-h-screen flex items-center justify-end px-4 md:px-16 lg:px-24 py-10">
        <!-- 注册卡片 (增加了 max-h 和滚动，防止内容过多超出屏幕) -->
        <div class="glass-card rounded-2xl shadow-2xl p-8 w-full max-w-md fade-in mr-0 md:mr-8 lg:mr-16 max-h-[90vh] overflow-y-auto no-scrollbar">
            
            <!-- Logo区域 -->
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-gradient-to-br from-blue-500 to-blue-700 rounded-2xl mb-3 shadow-lg">
                    <i class="fa-solid fa-user-plus w-7 h-7 text-white"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">创建账户</h1>
                <p class="text-sm text-gray-500 mt-1">加入 MediArk，开启智慧医疗之旅</p>
            </div>
            
            <!-- 注册表单 -->
            <form id="registerForm" class="space-y-4">
                
                <!-- 1. 真实姓名 -->
                <div class="space-y-1">
                    <label class="block text-xs font-medium text-gray-700 ml-1">真实姓名</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-user w-4 h-4 text-gray-400"></i>
                        </div>
                        <input type="text" name="realName" required
                               class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-800 placeholder-gray-400 input-focus focus:outline-none transition-all"
                               placeholder="您的姓名">
                    </div>
                </div>

                <!-- 2. 所属医院 -->
                <div class="space-y-1">
                    <label class="block text-xs font-medium text-gray-700 ml-1">所属医院</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-hospital w-4 h-4 text-gray-400"></i>
                        </div>
                        <input type="text" name="hospital" required
                               class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-800 placeholder-gray-400 input-focus focus:outline-none transition-all"
                               placeholder="任职医院全称">
                    </div>
                </div>

                <!-- 3. 工号 (核心) -->
                <div class="space-y-1">
                    <label class="block text-xs font-medium text-gray-700 ml-1">工号 (Job ID)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-id-badge w-4 h-4 text-gray-400"></i>
                        </div>
                        <input type="text" name="jobId" required
                               class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-800 placeholder-gray-400 input-focus focus:outline-none transition-all"
                               placeholder="您的员工编号">
                    </div>
                </div>

                <!-- 4. 手机号 -->
                <div class="space-y-1">
                    <label class="block text-xs font-medium text-gray-700 ml-1">手机号码</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-mobile-screen w-4 h-4 text-gray-400"></i>
                        </div>
                        <input type="tel" id="mobile" name="mobile" maxlength="11" required
                               class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-800 placeholder-gray-400 input-focus focus:outline-none transition-all"
                               placeholder="11位手机号码">
                    </div>
                </div>

                <!-- 5. 验证码 -->
                <div class="space-y-1">
                    <label class="block text-xs font-medium text-gray-700 ml-1">验证码</label>
                    <div class="flex gap-2">
                        <div class="relative flex-1">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fa-solid fa-comment-sms w-4 h-4 text-gray-400"></i>
                            </div>
                            <input type="text" name="code" maxlength="6" required
                                   class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-800 placeholder-gray-400 input-focus focus:outline-none transition-all"
                                   placeholder="6位验证码">
                        </div>
                        <button type="button" id="getCodeBtn"
                                class="px-4 py-2.5 bg-gray-100 hover:bg-gray-200 text-blue-600 text-xs font-medium rounded-xl transition-colors whitespace-nowrap min-w-[100px]">
                            获取验证码
                        </button>
                    </div>
                </div>

                <!-- 6. 密码 -->
                <div class="space-y-1">
                    <label class="block text-xs font-medium text-gray-700 ml-1">设置密码</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock w-4 h-4 text-gray-400"></i>
                        </div>
                        <input type="password" id="password" name="password" required
                               class="w-full pl-10 pr-10 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-800 placeholder-gray-400 input-focus focus:outline-none transition-all"
                               placeholder="6位以上密码">
                        <button type="button" onclick="togglePassword('password')" 
                                class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600">
                            <i class="fa-solid fa-eye w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <!-- 7. 确认密码 -->
                <div class="space-y-1">
                    <label class="block text-xs font-medium text-gray-700 ml-1">确认密码</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-circle-check w-4 h-4 text-gray-400"></i>
                        </div>
                        <input type="password" id="confirmPassword" required
                               class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-800 placeholder-gray-400 input-focus focus:outline-none transition-all"
                               placeholder="再次输入密码">
                    </div>
                    <p id="errorMsg" class="text-red-500 text-xs ml-1 hidden">两次密码不一致</p>
                </div>
                
                <!-- 注册按钮 -->
                <button type="submit" id="submitBtn"
                        class="w-full py-3 mt-2 btn-primary text-white font-medium rounded-xl shadow-lg flex items-center justify-center gap-2 text-sm">
                    <i class="fa-solid fa-rocket w-4 h-4"></i>
                    立即注册
                </button>
            </form>
            
            <!-- 返回登录 -->
            <div class="mt-6 text-center border-t border-gray-100 pt-4">
                <p class="text-sm text-gray-500">
                    已有账号？
                    <a href="Login.html" class="text-blue-600 font-medium hover:text-blue-700 hover:underline transition-colors">
                        返回登录
                    </a>
                </p>
            </div>
        </div>
    </div>

<script src="js/app/toast.js"></script>
<!-- register.html 的新脚本 -->
    <script>
        // 初始化图标
        

        // 密码显隐切换
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // 验证码倒计时 (保持不变)
        const getCodeBtn = document.getElementById('getCodeBtn');
        getCodeBtn.addEventListener('click', () => {
            const mobile = document.getElementById('mobile').value;
            if(!mobile || mobile.length !== 11) {
                toast.error('请先输入正确的手机号'); return;
            }
            let count = 60;
            getCodeBtn.disabled = true;
            getCodeBtn.classList.add('text-gray-400', 'cursor-not-allowed');
            getCodeBtn.innerText = `${count}s`;
            const timer = setInterval(() => {
                count--;
                getCodeBtn.innerText = `${count}s`;
                if(count < 0) {
                    clearInterval(timer);
                    getCodeBtn.disabled = false;
                    getCodeBtn.innerText = '获取验证码';
                    getCodeBtn.classList.remove('text-gray-400', 'cursor-not-allowed');
                }
            }, 1000);
            toast.info('模拟验证码已发送：888888');
        });

        // --- 核心注册逻辑（后端 API）---
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const pwd = document.getElementById('password').value;
            const confirmPwd = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('errorMsg');

            if (pwd !== confirmPwd) {
                errorMsg.classList.remove('hidden');
                return;
            }
            errorMsg.classList.add('hidden');

            const formData = new FormData(e.target);
            const fields = Object.fromEntries(formData.entries());

            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner w-4 h-4 animate-spin"></i> 注册中...`;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: fields.jobId,
                        displayName: fields.realName,
                        password: pwd
                    })
                });

                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error || '注册失败');
                }

                toast.success("注册成功！即将跳转到工作台...");
                setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
            } catch (err) {
                toast.error("注册失败：" + err.message);
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
