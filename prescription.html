<script>
    // 1. 患者数据（从后端 API 加载）
    var allPatientsList = [];
    var selectedPatient = null;
    let currentLang = 'zh';
    
    // i18n 已简化，页面主要使用中文

    // ⭐ 新增：步骤条高亮 + 已完成步骤绿色（Done）
    function setStepActive(step) {
        [1, 2, 3].forEach((n) => {
            const indicator = document.getElementById(`step-indicator-${n}`);
            if (!indicator) return;

            const circle = indicator.querySelector('div.w-10');
            const label = indicator.querySelector('span');

            if (!circle || !label) return;

            // 通用：先清理可能的颜色类
            circle.classList.remove('bg-blue-600', 'bg-gray-200', 'bg-green-500', 'text-gray-500', 'text-white');
            label.classList.remove('text-blue-700', 'text-gray-500', 'text-green-700', 'font-medium', 'font-semibold');

            if (n < step) {
                // 已完成：绿色
                circle.classList.add('bg-green-500', 'text-white', 'shadow-md');
                label.classList.add('text-green-700', 'font-semibold');
            } else if (n === step) {
                // 当前：蓝色
                circle.classList.add('bg-blue-600', 'text-white', 'shadow-md');

    // === 渲染资产预览 ===
    function renderAssets(masterJson, work) {

            images.forEach(function(img) {
                var src = img.path || img.url || '';
                var label = img.role || img.assetKey || 'image';
                if (src && (src.startsWith('http') || src.startsWith('data:'))) {
                    imgHtml += '<img src="' + src + '" alt="' + label + '" class="rounded h-24 w-full object-cover">';
                } else {
                    var statusText = img.status || 'queued';

        document.getElementById('images-preview').innerHTML = imgHtml;

        // 视频
        var videos = (artifacts.videos || []).concat(dbAssets.filter(function(a) { return a.assetType === 'video'; }));

        var vid = videos.length ? videos[0] : null;
        if (vid && vid.path) {
            videoEl.innerHTML = '<video controls class="w-full rounded-lg" src="' + vid.path + '"></video>';
        } else if (vid && vid.status === 'processing' && vid.taskId) {
            videoEl.innerHTML = '<div class="bg-slate-800 rounded-lg h-32 flex flex-col items-center justify-center text-slate-300">'
                + '<i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i>'

                + '</div>';

    // === 视频自动轮询 ===
    var _videoAutoTimer = null;
    function startVideoAutoPolling(taskId) {
        if (_videoAutoTimer) clearInterval(_videoAutoTimer);
        var retries = 0;
        var maxRetries = 18; // 18 × 10s = 3 minutes
        _videoAutoTimer = setInterval(async function() {
            retries++;
            if (retries > maxRetries) {
                clearInterval(_videoAutoTimer);
                _videoAutoTimer = null;
                return;
            }
            try {
                var res = await fetch('/api/works/video-status/' + taskId, { credentials: 'include' });
                if (!res.ok) return;
                var data = await res.json();
                if (data.status === 'succeeded' && data.videoUrl) {
                    clearInterval(_videoAutoTimer);
                    _videoAutoTimer = null;
                    document.getElementById('video-preview').innerHTML = '<video controls class="w-full rounded-lg" src="' + data.videoUrl + '"></video>';
                    document.getElementById('status-video').textContent = '已完成';
                } else if (data.status === 'failed') {
                    clearInterval(_videoAutoTimer);
                    _videoAutoTimer = null;
                    document.getElementById('status-video').textContent = '生成失败';
                }
            } catch (e) { /* ignore network errors during polling */ }
        }, 10000);
    }

    // === 核心生成逻辑 ===
    async function runGeneration(isRegen) {
        var loader = document.getElementById('ai-loader');
        var textArea = document.getElementById('ai-text-area');
        var subStatus = document.getElementById('ai-sub-status');
        var btnApprove = document.getElementById('btn-approve');
        var statusBar = document.getElementById('gen-status-bar');
        var genResult = document.getElementById('gen-result');

        loader.style.display = '';
        statusBar.classList.add('hidden');
        genResult.classList.add('hidden');
        if (isRegen) textArea.innerHTML = '';

        var steps = ["正在构建知识框架...", "AI 大模型文案优化中...", "生成多媒体资产...", "渲染海报..."];
        var si = 0;
        var interval = setInterval(function() { if (si < steps.length) subStatus.innerText = steps[si++]; }, 1200);

        var input = collectFormInput();
        var masterJson = null;
        var work = null;
        var diagnostics = null;

        try {
            var endpoint = isRegen && currentWorkId
                ? '/api/works/' + currentWorkId + '/regenerate'
                : '/api/works/generate';

            // 1) 发起生成请求（立即返回 taskId）
            var response = await fetch(endpoint, {
                method: 'POST', credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ input: input })
            });

            if (response.status === 401) {
                clearInterval(interval);
                loader.style.display = 'none';
                toast.error('请先登录后再使用生成功能。');
                window.location.href = 'Login.html';
                return;
            }

            if (!response.ok) {
                var errBody = await response.json().catch(function() { return {}; });
                throw new Error(errBody.error || 'API 请求失败 (' + response.status + ')');
            }

            var initialData = await response.json();

            // 2) 如果返回 taskId，说明是异步生成，开始轮询
            if (initialData.taskId) {
                var taskId = initialData.taskId;
                var pollStart = Date.now();
                var maxPollMs = 10 * 60 * 1000; // 10 分钟上限
                var taskResult = null;

                while (true) {
                    if (Date.now() - pollStart > maxPollMs) {
                        throw new Error('生成超时（超过 10 分钟），请稍后在「我的作品」查看');
                    }
                    await new Promise(function(r) { setTimeout(r, 3000); });
                    var pollRes = await fetch('/api/works/generate/task/' + taskId, { credentials: 'include' });
                    if (!pollRes.ok) {
                        throw new Error('无法查询生成进度 (' + pollRes.status + ')');
                    }
                    var pollData = await pollRes.json();
                    if (pollData.progress) subStatus.innerText = pollData.progress;
                    if (pollData.status === 'completed') {
                        taskResult = pollData.result;
                        break;
                    }
                    if (pollData.status === 'failed') {
                        throw new Error(pollData.error || '生成失败');
                    }
                }

                work = taskResult.work;
            } else {
                // 3) 兼容旧同步接口（regenerate 仍为同步）
                work = initialData.work;
            }

            currentWorkId = work.id;
            var version = work.latestVersion || (work.versions && work.versions[0]);
            masterJson = version ? version.masterJson : null;
            diagnostics = version ? version.diagnostics : null;

        } catch (apiErr) {
            clearInterval(interval);
            loader.style.display = 'none';
            var errorBanner = document.getElementById('gen-mode-banner');
            errorBanner.classList.remove('hidden');
            errorBanner.innerHTML = '<div class="bg-red-50 border border-red-200 rounded-lg p-4 text-sm">'
                + '<div class="flex items-center gap-2 mb-2"><i class="fa-solid fa-circle-xmark text-red-600"></i><span class="text-red-800 font-bold">生成失败</span></div>'
                + '<p class="text-red-700">' + (apiErr.message || '无法连接生成服务') + '</p>'
                + '<p class="text-red-600 mt-2">请确认：1) 已<a href="Login.html" class="underline font-bold">登录</a>账号 &nbsp; 2) 网络连接正常</p>'
                + '</div>';
            return;
        }

        // === 渲染结果 ===
        clearInterval(interval);
        loader.style.display = 'none';
        genResult.classList.remove('hidden');
        statusBar.classList.add('hidden'); // 不再需要顶部状态栏

        // 获取当前勾选的格式，设置按钮状态
        var selectedFormats = [];
        document.querySelectorAll('#output-formats input[type="checkbox"]:checked').forEach(function(cb) { selectedFormats.push(cb.value); });
        var hasPoster = selectedFormats.indexOf('poster') >= 0;
        var hasImage = selectedFormats.indexOf('image') >= 0;
        var hasVideo = selectedFormats.indexOf('video') >= 0;

        // 设置按钮启用/禁用状态
        document.querySelectorAll('.panel-btn').forEach(function(btn) {
            var p = btn.dataset.panel;
            var enabled = p === 'text' || (p === 'poster' && hasPoster) || (p === 'image' && hasImage) || (p === 'video' && hasVideo);
            btn.disabled = !enabled;
            if (!enabled) {
                btn.style.display = 'none';
            } else {
                btn.style.display = '';
            }
        });

        if (masterJson) {
            textArea.innerHTML = renderMasterContent(masterJson);
            renderAssets(masterJson, work);

            // 如果 LLM 降级了，显示提示
            if (masterJson._textError) {
                var hint = document.getElementById('text-error-hint');
                if (hint) { hint.textContent = 'LLM 降级: ' + masterJson._textError; hint.classList.remove('hidden'); }
            }
        }

        // 默认显示文案面板
        switchPanel('text');

        btnApprove.disabled = false;
        btnApprove.classList.remove('opacity-50', 'cursor-not-allowed');
    }

    // === 轮询视频生成状态 ===
    window.pollVideoStatus = async function(taskId) {
        var videoEl = document.getElementById('video-preview');
        videoEl.innerHTML = '<div class="bg-slate-800 rounded-lg h-32 flex flex-col items-center justify-center text-slate-300"><i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i><span class="text-xs">正在查询...</span></div>';

        try {
            var res = await fetch('/api/works/video-status/' + taskId, { credentials: 'include' });
            if (!res.ok) throw new Error('查询失败');
            var data = await res.json();

            if (data.status === 'succeeded' && data.videoUrl) {
                videoEl.innerHTML = '<video controls class="w-full rounded-lg" src="' + data.videoUrl + '"></video>';
                document.getElementById('status-video').textContent = '已完成';
            } else if (data.status === 'running' || data.status === 'processing') {
                videoEl.innerHTML = '<div class="bg-slate-800 rounded-lg h-32 flex flex-col items-center justify-center text-slate-300">'
                    + '<i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i>'
                    + '<span class="text-xs">仍在生成中...</span>'
                    + '<button onclick="pollVideoStatus(\'' + taskId + '\')" class="mt-2 px-3 py-1 bg-blue-600 text-white text-xs rounded hover:bg-blue-700">再次刷新</button>'
                    + '</div>';
            } else {
                videoEl.innerHTML = '<div class="bg-slate-800 rounded-lg h-32 flex flex-col items-center justify-center text-red-400"><i class="fa-solid fa-circle-xmark text-2xl mb-2"></i><span class="text-xs">生成失败: ' + (data.status || 'unknown') + '</span></div>';
            }
        } catch (err) {
            videoEl.innerHTML = '<div class="bg-slate-800 rounded-lg h-32 flex flex-col items-center justify-center text-red-400"><i class="fa-solid fa-circle-xmark text-2xl mb-2"></i><span class="text-xs">' + err.message + '</span></div>';
        }
    };

    function goBackToStep1() {
        if (_videoAutoTimer) { clearInterval(_videoAutoTimer); _videoAutoTimer = null; }
        // 把审核意见回填到医生备注
        var feedback = (document.getElementById('feedback-input').value || '').trim();
        if (feedback) {
            var notes = document.getElementById('doctor-notes');
            var existing = (notes.value || '').trim();
            notes.value = existing ? existing + '\n【审核意见】' + feedback : '【审核意见】' + feedback;
            document.getElementById('feedback-input').value = '';
        }
        document.getElementById('step-2-content').classList.add('hidden');
        document.getElementById('gen-mode-banner').classList.add('hidden');
        document.getElementById('step-1-content').classList.remove('hidden');
        setStepActive(1);
    }

    function toggleLang() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        document.getElementById('lang-display').textContent = currentLang === 'zh' ? 'English' : '中文';
    }
</script>
</body>
</html>
